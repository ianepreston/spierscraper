name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Check flake
        run: nix flake check

      - name: Lint
        run: nix develop -c ruff check src/ tests/

      - name: Type check
        run: nix develop -c mypy src/

      - name: Test
        run: nix develop -c pytest tests/ -v --cov=spierscraper --cov-report=xml

      - name: Build package
        run: nix build .#default

  build-docker:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Docker image
        run: nix build .#docker

      - name: Load image
        run: docker load < result

      - name: Login to ghcr.io
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Calculate CalVer version
        if: github.event_name == 'push'
        id: calver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y.%m.%d)
          # Get existing tags for today from the registry
          EXISTING=$(gh api "/users/${{ github.repository_owner }}/packages/container/spierscraper/versions" --paginate 2>/dev/null \
            | jq -r '.[].metadata.container.tags[]' 2>/dev/null \
            | grep "^${DATE}\." \
            | sort -t. -k4 -n \
            | tail -1 || true)
          if [ -z "$EXISTING" ]; then
            VERSION="${DATE}.1"
          else
            N=$(echo "$EXISTING" | cut -d. -f4)
            VERSION="${DATE}.$((N + 1))"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Calculated version: $VERSION"

      - name: Tag and push
        if: github.event_name == 'push'
        run: |
          docker tag spierscraper:latest ghcr.io/${{ github.repository }}:latest
          docker tag spierscraper:latest ghcr.io/${{ github.repository }}:${{ steps.calver.outputs.version }}
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ steps.calver.outputs.version }}
